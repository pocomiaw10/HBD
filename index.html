<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun! 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .birthday-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 800px;
            width: 90%;
            animation: card-appear 1s ease-out;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        @keyframes card-appear {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            color: #6c5ce7;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 rgba(108, 92, 231, 0.2);
            animation: glow 2s ease infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 3px 3px 0 rgba(108, 92, 231, 0.2); }
            50% { text-shadow: 6px 6px 10px rgba(108, 92, 231, 0.5); }
        }

        .name {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .cake {
            font-size: 8rem;
            display: inline-block;
            animation: bounce 2s ease infinite;
            margin: 20px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .message {
            font-size: 1.3rem;
            color: #2d3436;
            margin: 20px 0;
            line-height: 1.8;
        }

        .name-input-section {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .name-input {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #6c5ce7;
            border-radius: 50px;
            outline: none;
            width: 250px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-update {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #6c5ce7;
            border: 2px solid #6c5ce7;
        }

        .btn-secondary:hover {
            background: #6c5ce7;
            color: white;
            transform: translateY(-3px);
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f2d74e;
            opacity: 0.7;
            z-index: 1000;
            pointer-events: none;
            animation: confetti-fall 4s linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .surprise-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            display: none;
            text-align: center;
            min-width: 300px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .birthday-card {
                padding: 30px;
            }
            
            .cake {
                font-size: 6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="birthday-card">
            <h1>🎉 Selamat Ulang Tahun! 🎉</h1>
            
            <div class="name-input-section">
                <input type="text" class="name-input" id="nameInput" placeholder="Nama yang ulang tahun..." value="Sahabat Tersayang">
                <button class="btn-update" onclick="updateName()">Ganti Nama</button>
            </div>
            
            <div class="name" id="friendName">Sahabat Tersayang</div>
            
            <div class="cake">🎂</div>
            
            <div class="message" id="birthdayMessage">
                Semoga di hari yang spesial ini,<br>
                semua mimpi dan harapanmu menjadi kenyataan.<br>
                Teruslah bersinar dan menjadi berkat bagi sesama!<br>
                ✨🎂🎈
            </div>
            
            <div class="buttons">
                <button class="btn btn-primary" onclick="startCelebration()">
                    🎉 Mulai Perayaan
                </button>
                <button class="btn btn-secondary" onclick="createConfetti()">
                    🎊 Kembang Api
                </button>
            </div>
            
            <div style="margin-top: 20px; color: #666;">
                ❤️ <span id="wishCount">0</span> doa dan harapan baik
            </div>
        </div>
    </div>
    
    <!-- Surprise Message -->
    <div class="surprise-message" id="surpriseModal">
        <button class="close-btn" onclick="closeSurprise()">×</button>
        <h2 style="color: #6c5ce7; margin-bottom: 20px;">🎁 Kejutan!</h2>
        <p style="font-size: 1.2rem; margin-bottom: 20px;" id="surpriseText">
            Kamu adalah orang yang spesial!<br>
            Semoga hari ini seindah senyumanmu 😊
        </p>
        <div style="font-size: 3rem;">💝</div>
    </div>
    
    <script>
        function updateName() {
            const input = document.getElementById('nameInput');
            const nameDisplay = document.getElementById('friendName');
            const surpriseText = document.getElementById('surpriseText');
            const newName = input.value.trim() || "Sahabat Tersayang";
            
            nameDisplay.textContent = newName;
            surpriseText.innerHTML = `Hallo ${newName}!<br>Kamu adalah orang yang spesial!<br>Semoga hari ini seindah senyumanmu 😊`;
            createConfetti();
        }
        
        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = (Math.random() * 10 + 5) + 'px';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, 4000);
                }, i * 50);
            }
            
            let count = document.getElementById('wishCount');
            count.textContent = parseInt(count.textContent) + 1;
        }
        
        function startCelebration() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createConfetti();
                }, i * 200);
            }
            
            setTimeout(() => {
                showSurprise();
            }, 500);
        }
        
        function showSurprise() {
            document.getElementById('surpriseModal').style.display = 'block';
        }
        
        function closeSurprise() {
            document.getElementById('surpriseModal').style.display = 'none';
        }
        
        // Set initial wish count
        document.getElementById('wishCount').textContent = '0';
    </script>
</body>
</html>
